syntax = "proto3";
package liftedinit.billing.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "liftedinit/billing/v1/types.proto";

option go_package = "github.com/manifest-network/manifest-ledger/x/billing/types";

// GenesisState defines the billing module's genesis state.
message GenesisState {
  option (amino.name) = "lifted/billing/GenesisState";

  // params defines the module parameters.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag) = "params"
  ];

  // leases is the list of all leases.
  repeated Lease leases = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag) = "leases"
  ];

  // credit_accounts is the list of all credit accounts.
  repeated CreditAccount credit_accounts = 3 [
    (gogoproto.nullable) = false,
    (gogoproto.jsontag) = "credit_accounts"
  ];

  // lease_sequence is the sequence counter for deterministic lease UUID generation.
  // Exported via Sequence.Peek(); the next Sequence.Next() call will return this value.
  uint64 lease_sequence = 4 [ (gogoproto.jsontag) = "lease_sequence" ];
}
