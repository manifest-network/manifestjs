syntax = "proto3";
package liftedinit.sku.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/manifest-network/manifest-ledger/x/sku/types";

// Unit defines the billing unit for a SKU.
enum Unit {
  // UNIT_UNSPECIFIED is the default unspecified unit.
  UNIT_UNSPECIFIED = 0;
  // UNIT_PER_HOUR is a per-hour billing unit.
  UNIT_PER_HOUR = 1;
  // UNIT_PER_DAY is a per-day billing unit.
  UNIT_PER_DAY = 2;
}

// Params defines the parameters for the sku module.
message Params {
  option (amino.name) = "lifted/sku/Params";
  option (gogoproto.equal) = true;

  // allowed_list is the list of addresses allowed to manage SKUs
  // in addition to the module authority.
  repeated string allowed_list = 1
      [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
}

// Provider defines a SKU provider entity.
message Provider {
  option (amino.name) = "lifted/sku/Provider";

  // uuid is the unique identifier for the provider (UUIDv7 format).
  string uuid = 1 [(gogoproto.jsontag) = "uuid,omitempty"];

  // address is the management address of the provider.
  string address = 2 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag) = "address,omitempty"
  ];

  // payout_address is the address where payments are sent.
  string payout_address = 3 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (gogoproto.jsontag) = "payout_address,omitempty"
  ];

  // meta_hash is a hash of the off-chain metadata (name, description, etc.).
  bytes meta_hash = 4 [(gogoproto.jsontag) = "meta_hash,omitempty"];

  // active indicates whether the provider is active.
  bool active = 5 [(gogoproto.jsontag) = "active,omitempty"];

  // api_url is the HTTPS endpoint where the provider's off-chain API is hosted.
  // Tenants use this URL to retrieve connection details for their leases.
  // Must be a valid HTTPS URL.
  string api_url = 6 [(gogoproto.jsontag) = "api_url,omitempty"];
}

// SKU defines a stock keeping unit for on-chain billing.
message SKU {
  option (amino.name) = "lifted/sku/SKU";

  // uuid is the unique identifier for the SKU (UUIDv7 format).
  string uuid = 1 [(gogoproto.jsontag) = "uuid,omitempty"];

  // provider_uuid is the unique identifier of the SKU provider.
  string provider_uuid = 2 [(gogoproto.jsontag) = "provider_uuid,omitempty"];

  // name is the human-readable name of the SKU.
  string name = 3 [(gogoproto.jsontag) = "name,omitempty"];

  // unit is the billing unit for the SKU.
  Unit unit = 4 [(gogoproto.jsontag) = "unit,omitempty"];

  // base_price is the base price for the SKU.
  cosmos.base.v1beta1.Coin base_price = 5 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true,
    (amino.encoding) = "legacy_coin",
    (gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.Coin",
    (gogoproto.jsontag) = "base_price"
  ];

  // meta_hash is a hash of the off-chain metadata.
  bytes meta_hash = 6 [(gogoproto.jsontag) = "meta_hash,omitempty"];

  // active indicates whether the SKU is active.
  bool active = 7 [(gogoproto.jsontag) = "active,omitempty"];
}
