syntax = "proto3";
package liftedinit.sku.v1;

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/base/v1beta1/coin.proto";
import "amino/amino.proto";
import "liftedinit/sku/v1/types.proto";

option go_package = "github.com/manifest-network/manifest-ledger/x/sku/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CreateProvider creates a new provider.
  rpc CreateProvider(MsgCreateProvider) returns (MsgCreateProviderResponse);

  // UpdateProvider updates an existing provider.
  rpc UpdateProvider(MsgUpdateProvider) returns (MsgUpdateProviderResponse);

  // DeactivateProvider deactivates a provider (soft delete).
  // Deactivated providers cannot create new SKUs but existing SKUs continue.
  rpc DeactivateProvider(MsgDeactivateProvider) returns (MsgDeactivateProviderResponse);

  // CreateSKU creates a new SKU.
  rpc CreateSKU(MsgCreateSKU) returns (MsgCreateSKUResponse);

  // UpdateSKU updates an existing SKU.
  rpc UpdateSKU(MsgUpdateSKU) returns (MsgUpdateSKUResponse);

  // DeactivateSKU deactivates a SKU (soft delete).
  // Deactivated SKUs cannot be used for new leases but existing leases continue.
  rpc DeactivateSKU(MsgDeactivateSKU) returns (MsgDeactivateSKUResponse);

  // UpdateParams updates the module parameters.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgCreateProvider is the Msg/CreateProvider request type.
message MsgCreateProvider {
  option (cosmos.msg.v1.signer) = "authority";
  option (gogoproto.equal) = false;
  option (amino.name) = "lifted/sku/MsgCreateProvider";

  // authority is the address of the controlling account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // address is the management address of the provider.
  string address = 2 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // payout_address is the address where payments are sent.
  string payout_address = 3 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // meta_hash is a hash of the off-chain metadata.
  bytes meta_hash = 4;

  // api_url is the HTTPS endpoint where the provider's off-chain API is hosted.
  // Must be a valid HTTPS URL.
  string api_url = 5;
}

// MsgCreateProviderResponse is the Msg/CreateProvider response type.
message MsgCreateProviderResponse {
  // uuid is the unique identifier of the created provider (UUIDv7 format).
  string uuid = 1;
}

// MsgUpdateProvider is the Msg/UpdateProvider request type.
message MsgUpdateProvider {
  option (cosmos.msg.v1.signer) = "authority";
  option (gogoproto.equal) = false;
  option (amino.name) = "lifted/sku/MsgUpdateProvider";

  // authority is the address of the controlling account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // uuid is the unique identifier of the provider to update.
  string uuid = 2;

  // address is the management address of the provider.
  string address = 3 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // payout_address is the address where payments are sent.
  string payout_address = 4 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // meta_hash is a hash of the off-chain metadata.
  bytes meta_hash = 5;

  // active indicates whether the provider is active.
  bool active = 6;

  // api_url is the HTTPS endpoint where the provider's off-chain API is hosted.
  string api_url = 7;
}

// MsgUpdateProviderResponse is the Msg/UpdateProvider response type.
message MsgUpdateProviderResponse {}

// MsgDeactivateProvider is the Msg/DeactivateProvider request type.
// This performs a soft delete - the provider remains in state but is marked inactive.
message MsgDeactivateProvider {
  option (cosmos.msg.v1.signer) = "authority";
  option (gogoproto.equal) = false;
  option (amino.name) = "lifted/sku/MsgDeactivateProvider";

  // authority is the address of the controlling account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // uuid is the unique identifier of the provider to deactivate.
  string uuid = 2;
}

// MsgDeactivateProviderResponse is the Msg/DeactivateProvider response type.
message MsgDeactivateProviderResponse {}

// MsgCreateSKU is the Msg/CreateSKU request type.
message MsgCreateSKU {
  option (cosmos.msg.v1.signer) = "authority";
  option (gogoproto.equal) = false;
  option (amino.name) = "lifted/sku/MsgCreateSKU";

  // authority is the address of the controlling account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // provider_uuid is the unique identifier of the SKU provider.
  string provider_uuid = 2;

  // name is the human-readable name of the SKU.
  string name = 3;

  // unit is the billing unit for the SKU.
  Unit unit = 4;

  // base_price is the base price for the SKU.
  cosmos.base.v1beta1.Coin base_price = 5 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true,
    (amino.encoding) = "legacy_coin",
    (gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.Coin"
  ];

  // meta_hash is a hash of the off-chain metadata.
  bytes meta_hash = 6;
}

// MsgCreateSKUResponse is the Msg/CreateSKU response type.
message MsgCreateSKUResponse {
  // uuid is the unique identifier of the created SKU (UUIDv7 format).
  string uuid = 1;
}

// MsgUpdateSKU is the Msg/UpdateSKU request type.
message MsgUpdateSKU {
  option (cosmos.msg.v1.signer) = "authority";
  option (gogoproto.equal) = false;
  option (amino.name) = "lifted/sku/MsgUpdateSKU";

  // authority is the address of the controlling account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // uuid is the unique identifier of the SKU to update.
  string uuid = 2;

  // provider_uuid is the unique identifier of the SKU provider.
  string provider_uuid = 3;

  // name is the human-readable name of the SKU.
  string name = 4;

  // unit is the billing unit for the SKU.
  Unit unit = 5;

  // base_price is the base price for the SKU.
  cosmos.base.v1beta1.Coin base_price = 6 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true,
    (amino.encoding) = "legacy_coin",
    (gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.Coin"
  ];

  // meta_hash is a hash of the off-chain metadata.
  bytes meta_hash = 7;

  // active indicates whether the SKU is active.
  bool active = 8;
}

// MsgUpdateSKUResponse is the Msg/UpdateSKU response type.
message MsgUpdateSKUResponse {}

// MsgDeactivateSKU is the Msg/DeactivateSKU request type.
// This performs a soft delete - the SKU remains in state but is marked inactive.
message MsgDeactivateSKU {
  option (cosmos.msg.v1.signer) = "authority";
  option (gogoproto.equal) = false;
  option (amino.name) = "lifted/sku/MsgDeactivateSKU";

  // authority is the address of the controlling account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // uuid is the unique identifier of the SKU to deactivate.
  string uuid = 2;
}

// MsgDeactivateSKUResponse is the Msg/DeactivateSKU response type.
message MsgDeactivateSKUResponse {}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (gogoproto.equal) = false;
  option (amino.name) = "lifted/sku/MsgUpdateParams";

  // authority is the address of the governance account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // params defines the module parameters to update.
  Params params = 2 [ (gogoproto.nullable) = false ];
}

// MsgUpdateParamsResponse is the Msg/UpdateParams response type.
message MsgUpdateParamsResponse {}
