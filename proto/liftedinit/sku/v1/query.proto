syntax = "proto3";
package liftedinit.sku.v1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "liftedinit/sku/v1/types.proto";

option go_package = "github.com/manifest-network/manifest-ledger/x/sku/types";

// Query defines the gRPC querier service for the sku module.
service Query {
  // Params queries the module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/liftedinit/sku/v1/params";
  }

  // Provider queries a provider by uuid.
  rpc Provider(QueryProviderRequest) returns (QueryProviderResponse) {
    option (google.api.http).get = "/liftedinit/sku/v1/provider/{uuid}";
  }

  // Providers queries all providers.
  rpc Providers(QueryProvidersRequest) returns (QueryProvidersResponse) {
    option (google.api.http).get = "/liftedinit/sku/v1/providers";
  }

  // SKU queries a SKU by uuid.
  rpc SKU(QuerySKURequest) returns (QuerySKUResponse) {
    option (google.api.http).get = "/liftedinit/sku/v1/sku/{uuid}";
  }

  // SKUs queries all SKUs.
  rpc SKUs(QuerySKUsRequest) returns (QuerySKUsResponse) {
    option (google.api.http).get = "/liftedinit/sku/v1/skus";
  }

  // SKUsByProvider queries SKUs by provider uuid.
  rpc SKUsByProvider(QuerySKUsByProviderRequest)
      returns (QuerySKUsByProviderResponse) {
    option (google.api.http).get = "/liftedinit/sku/v1/skus/provider/{provider_uuid}";
  }

  // ProviderByAddress queries a provider by management address.
  rpc ProviderByAddress(QueryProviderByAddressRequest)
      returns (QueryProviderByAddressResponse) {
    option (google.api.http).get = "/liftedinit/sku/v1/provider/address/{address}";
  }
}

// QueryParamsRequest is the request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params defines the module parameters.
  Params params = 1 [ (gogoproto.nullable) = false ];
}

// QueryProviderRequest is the request type for the Query/Provider RPC method.
message QueryProviderRequest {
  // uuid is the unique identifier of the provider.
  string uuid = 1;
}

// QueryProviderResponse is the response type for the Query/Provider RPC method.
message QueryProviderResponse {
  // provider is the provider.
  Provider provider = 1 [ (gogoproto.nullable) = false ];
}

// QueryProvidersRequest is the request type for the Query/Providers RPC method.
message QueryProvidersRequest {
  // pagination defines an optional pagination for the request.
  cosmos.base.query.v1beta1.PageRequest pagination = 1;

  // active_only filters to return only active providers when true.
  bool active_only = 2;
}

// QueryProvidersResponse is the response type for the Query/Providers RPC method.
message QueryProvidersResponse {
  // providers is the list of providers.
  repeated Provider providers = 1 [ (gogoproto.nullable) = false ];

  // pagination defines the pagination in the response.
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QuerySKURequest is the request type for the Query/SKU RPC method.
message QuerySKURequest {
  // uuid is the unique identifier of the SKU.
  string uuid = 1;
}

// QuerySKUResponse is the response type for the Query/SKU RPC method.
message QuerySKUResponse {
  // sku is the SKU.
  SKU sku = 1 [ (gogoproto.nullable) = false ];
}

// QuerySKUsRequest is the request type for the Query/SKUs RPC method.
message QuerySKUsRequest {
  // pagination defines an optional pagination for the request.
  cosmos.base.query.v1beta1.PageRequest pagination = 1;

  // active_only filters to return only active SKUs when true.
  bool active_only = 2;
}

// QuerySKUsResponse is the response type for the Query/SKUs RPC method.
message QuerySKUsResponse {
  // skus is the list of SKUs.
  repeated SKU skus = 1 [ (gogoproto.nullable) = false ];

  // pagination defines the pagination in the response.
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QuerySKUsByProviderRequest is the request type for the Query/SKUsByProvider
// RPC method.
message QuerySKUsByProviderRequest {
  // provider_uuid is the unique identifier of the SKU provider.
  string provider_uuid = 1;

  // pagination defines an optional pagination for the request.
  cosmos.base.query.v1beta1.PageRequest pagination = 2;

  // active_only filters to return only active SKUs when true.
  bool active_only = 3;
}

// QuerySKUsByProviderResponse is the response type for the Query/SKUsByProvider
// RPC method.
message QuerySKUsByProviderResponse {
  // skus is the list of SKUs.
  repeated SKU skus = 1 [ (gogoproto.nullable) = false ];

  // pagination defines the pagination in the response.
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryProviderByAddressRequest is the request type for the Query/ProviderByAddress
// RPC method.
message QueryProviderByAddressRequest {
  // address is the management address of the provider.
  string address = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // pagination defines an optional pagination for the request.
  cosmos.base.query.v1beta1.PageRequest pagination = 2;

  // active_only filters to return only active providers when true.
  bool active_only = 3;
}

// QueryProviderByAddressResponse is the response type for the Query/ProviderByAddress
// RPC method.
message QueryProviderByAddressResponse {
  // providers is the list of providers with the given address.
  repeated Provider providers = 1 [ (gogoproto.nullable) = false ];

  // pagination defines the pagination in the response.
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
