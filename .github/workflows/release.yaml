name: Release

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

permissions:
  contents: write
  id-token: write # required for npm provenance (OIDC signing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.5.1

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn tsc -p tsconfig.json --noEmit

      - run: yarn build

      - name: Verify build outputs
        run: |
          MISSING=0
          for f in dist/index.js dist/index.mjs dist/index.d.ts; do
            if [ ! -s "$f" ]; then
              echo "::error::expected build output missing or empty: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi

      - run: yarn lint

      - run: yarn test

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "::warning::${PKG_NAME}@${VERSION} already published, skipping"
            exit 0
          fi
          npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, skipping"
            exit 0
          fi
          if ! gh release create "$GITHUB_REF_NAME" --generate-notes; then
            echo "::error::Package was published to npm, but GitHub Release creation failed."
            echo "::error::Create it manually: gh release create $GITHUB_REF_NAME --generate-notes"
            exit 1
          fi
